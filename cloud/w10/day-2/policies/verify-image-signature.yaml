apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/description: >
      Chỉ cho phép image đã được ký bằng Cosign. Image chưa ký bị reject tại admission.
spec:
  validationFailureAction: Enforce
  background: false    # chỉ check lúc admission, không audit pod đang chạy
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["demo"]
      verifyImages:
        - imageReferences:
            - "ghcr.io/hunghk43/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/hunghk43/*"
                    issuer: "https://token.actions.githubusercontent.com"
