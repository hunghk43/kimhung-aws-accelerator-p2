name: build-sign-push

on:
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  build-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # bắt buộc cho keyless Cosign OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}/w9-api:${{ github.sha }} app/

      - name: Scan with Trivy trước khi push
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/w9-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push image
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}/w9-api:${{ github.sha }}

      - name: Sign image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/w9-api:${{ github.sha }}
