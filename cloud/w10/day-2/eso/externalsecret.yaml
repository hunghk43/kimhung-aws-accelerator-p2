apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-secret
  namespace: demo
spec:
  # Poll AWS mỗi 30s → rotate < 60s no-restart
  refreshInterval: 30s

  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore

  target:
    name: api-db-secret        # tên K8s Secret sẽ được tạo
    creationPolicy: Owner      # ESO sở hữu Secret này, xóa ExternalSecret = xóa Secret

  data:
    - secretKey: db-password   # key trong K8s Secret
      remoteRef:
        key: prod/api/db       # key trong AWS Secrets Manager
        property: password     # field trong JSON secret
