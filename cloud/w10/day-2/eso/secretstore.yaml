apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        # Dùng IRSA — không hardcode AWS credentials
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
