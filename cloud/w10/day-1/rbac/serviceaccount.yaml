# ServiceAccount riêng cho API workload — không dùng default SA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: demo
automountServiceAccountToken: false  # không mount token nếu không cần gọi K8s API
---
# Role tối thiểu cho api-sa: chỉ đọc ConfigMap của chính nó
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-sa-role
  namespace: demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["api-config"]   # chỉ ConfigMap tên api-config, không phải tất cả
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-sa-binding
  namespace: demo
subjects:
  - kind: ServiceAccount
    name: api-sa
    namespace: demo
roleRef:
  kind: Role
  name: api-sa-role
  apiGroup: rbac.authorization.k8s.io
