# Demo: NetworkPolicy — kiểm soát traffic giữa các Pod
# Chạy: kubectl apply -f 04-networkpolicy.yaml
# Lưu ý: minikube cần CNI plugin hỗ trợ NetworkPolicy (calico/cilium)
#         minikube start --cni=calico

---
# Deny all ingress mặc định cho namespace
# Best practice: bắt đầu bằng deny-all, rồi whitelist từng rule
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}   # áp dụng cho tất cả Pod trong namespace
  policyTypes:
    - Ingress       # block tất cả inbound traffic

---
# Chỉ cho phép frontend gọi backend
# frontend Pod (app=frontend) → backend Pod (app=backend) : port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
spec:
  podSelector:
    matchLabels:
      app: backend      # policy áp dụng cho backend Pod

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend   # chỉ cho phép từ frontend Pod
      ports:
        - protocol: TCP
          port: 8080
