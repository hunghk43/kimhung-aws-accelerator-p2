# Demo: ConfigMap + Secret + inject vào Pod
# Chạy: kubectl apply -f 02-configmap-secret.yaml

---
# ConfigMap — config không nhạy cảm
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: "dev"
  APP_PORT: "8080"
  LOG_LEVEL: "info"
  # Có thể mount dạng file
  app.properties: |
    server.port=8080
    logging.level=info

---
# Secret — data nhạy cảm, encode base64
# echo -n "mypassword" | base64  →  bXlwYXNzd29yZA==
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  DB_PASSWORD: bXlwYXNzd29yZA==   # "mypassword"
  API_KEY: c2VjcmV0a2V5MTIz       # "secretkey123"

---
# Pod sử dụng ConfigMap và Secret
apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  labels:
    app: myapp
spec:
  containers:
    - name: app
      image: nginx:1.25-alpine
      ports:
        - containerPort: 8080

      # Inject từng key thành env var
      env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD

      # Inject toàn bộ ConfigMap thành env vars
      envFrom:
        - configMapRef:
            name: app-config

      # Mount ConfigMap dạng file vào container
      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true

  volumes:
    - name: config-volume
      configMap:
        name: app-config
