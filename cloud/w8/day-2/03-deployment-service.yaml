# Demo: Deployment + Service (cách dùng thực tế, không dùng Pod trực tiếp)
# Chạy: kubectl apply -f 03-deployment-service.yaml
# Test:  minikube service web-service --url

---
# Deployment — quản lý ReplicaSet → Pod
# Tự heal khi Pod crash, rolling update khi đổi image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
spec:
  replicas: 3   # luôn giữ 3 Pod chạy

  selector:
    matchLabels:
      app: web  # quản lý Pod có label này

  # Rolling update strategy — không downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # tối đa 1 Pod down cùng lúc
      maxSurge: 1         # tối đa tạo thêm 1 Pod trong quá trình update

  template:
    metadata:
      labels:
        app: web  # label phải match selector ở trên
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
# Service — stable endpoint cho Deployment
# ClusterIP: chỉ internal; NodePort: expose ra ngoài qua port Node
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort   # dùng NodePort để test trên minikube
  selector:
    app: web       # forward traffic đến Pod có label app=web
  ports:
    - protocol: TCP
      port: 80        # port của Service (cluster internal)
      targetPort: 80  # port của container
      nodePort: 30080 # port trên Node (30000-32767)
